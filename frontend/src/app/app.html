<div class="h-screen bg-gray-50 flex flex-col font-sans overflow-hidden">
  <header class="bg-white border-b border-gray-200 shadow-sm flex-shrink-0 z-10">
    <div class="h-16 px-4 sm:px-6 lg:px-8 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="bg-[#FF4F00] text-white rounded-lg font-black text-xl leading-none flex items-center justify-center w-10 h-10 shadow-sm">
          R
        </div>
        <h1 class="text-xl font-bold text-gray-900 tracking-tight">System Health Monitor</h1>
      </div>
      <div class="text-sm font-medium text-[#FF4F00] bg-orange-50 px-3 py-1.5 rounded-full hidden sm:block">
        Métricas en Vivo
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <main class="flex-1 overflow-y-auto px-4 sm:px-6 lg:px-12 py-10 min-w-0">
      <div class="mb-10">
        <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Salud del Sistema</h2>
        <p class="text-lg text-gray-500 mt-2">Monitoreo de visibilidad de tiendas y detección de caídas en tiempo real.</p>
      </div>

      <app-kpi-cards [stats]="stats"></app-kpi-cards>

      <div class="flex flex-col gap-8 mt-8">
        <div class="w-full">
          <app-health-chart [data]="healthSeries"></app-health-chart>
        </div>
        <div class="w-full">
          <app-incident-log [incidents]="incidents"></app-incident-log>
        </div>
      </div>
    </main>

    <aside class="w-full lg:w-[450px] flex-shrink-0 border-l border-gray-200 bg-white shadow-sm flex flex-col overflow-hidden">
      <app-chatbot class="h-full flex flex-col"></app-chatbot>
    </aside>
  </div>
</div>
<router-outlet></router-outlet>
