<!-- Rappi Main App Layout -->
<div class="min-h-screen bg-gray-50 flex flex-col font-sans">
  
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Rappi Logo Placeholder -->
        <div class="bg-rappi-500 text-white rounded-lg p-2 font-black text-xl leading-none flex items-center justify-center w-10 h-10 shadow-sm">
          R
        </div>
        <h1 class="text-xl font-bold text-gray-900 tracking-tight">Availability Dashboard</h1>
      </div>
      <div class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1.5 rounded-full">
        Métricas en Vivo
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-gray-900">Resumen de Operaciones</h2>
      <p class="text-gray-500 mt-1">Monitoreo de intermitencias y estabilidad por tienda.</p>
    </div>

    <!-- Dashboard Widget Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- Chart spanning roughly 2/3 width on large screens -->
      <div class="lg:col-span-2">
        <app-offline-chart></app-offline-chart>
      </div>

      <!-- Table spanning roughly 1/3 width on large screens -->
      <div class="lg:col-span-1">
        <app-top-stores-table></app-top-stores-table>
      </div>

    </div>
  </main>
</div>

<!-- Router Outlet for potential future navigations -->
<router-outlet></router-outlet>
