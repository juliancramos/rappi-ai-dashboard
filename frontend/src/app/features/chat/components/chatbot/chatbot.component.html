<!-- Sidebar Header -->
<div class="flex items-center gap-4 px-6 py-5 border-b border-gray-100 flex-shrink-0 bg-white">
  <div class="w-12 h-12 rounded-xl bg-[#FF4F00] flex items-center justify-center shadow-sm flex-shrink-0">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
    </svg>
  </div>
  <div>
    <p class="font-bold text-lg text-gray-900 leading-tight">Asistente IA Rappi</p>
    <p class="text-sm text-gray-400 mt-1 font-medium">Powered by Gemini</p>
  </div>
</div>

<!-- Message History — fills all available space -->
<div
  #messageContainer
  class="flex-1 overflow-y-auto px-4 py-5 space-y-4 bg-gray-50/60"
>
  <!-- Empty State -->
  <div *ngIf="messages.length === 0" class="flex flex-col items-center justify-center h-full text-center px-8 gap-6">
    <div class="w-20 h-20 rounded-2xl bg-orange-50 border border-orange-100 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-[#FF4F00]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
      </svg>
    </div>
    <div>
      <p class="text-xl font-bold text-gray-800">¿Tienes alguna pregunta?</p>
      <p class="text-base text-gray-500 mt-2 leading-relaxed">Pregúntame sobre la disponibilidad, intermitencias o el rendimiento de las tiendas Rappi.</p>
    </div>
    <!-- Example prompts -->
    <div class="flex flex-col gap-4 w-full mt-4">
      <button
        *ngFor="let prompt of examplePrompts"
        (click)="usePrompt(prompt)"
        class="text-left text-base font-medium text-gray-600 border-2 border-gray-200 bg-white hover:border-[#FF4F00] hover:text-[#FF4F00] rounded-xl px-5 py-4 transition-all shadow-sm cursor-pointer"
      >
        {{ prompt }}
      </button>
    </div>
  </div>

  <!-- Chat Messages -->
  <ng-container *ngIf="messages.length > 0">
    <div
      *ngFor="let msg of messages"
      class="flex gap-2"
      [class.flex-row-reverse]="msg.role === 'user'"
    >
      <!-- Bot Avatar -->
      <div
        *ngIf="msg.role === 'bot'"
        class="w-10 h-10 rounded-xl bg-[#FF4F00] flex items-center justify-center flex-shrink-0 mt-1 shadow-sm"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
        </svg>
      </div>

      <!-- Bubble -->
      <div
        class="max-w-[85%] px-6 py-5 rounded-3xl text-xl leading-relaxed shadow-sm font-medium"
        [ngClass]="{
          'bg-[#FF4F00] text-white rounded-tr-sm': msg.role === 'user',
          'bg-white text-gray-900 rounded-tl-sm border-2 border-gray-200': msg.role === 'bot'
        }"
      >
        {{ msg.content }}
      </div>
    </div>

    <!-- Thinking / Typing Indicator -->
    <div *ngIf="isThinking" class="flex gap-3 items-center">
      <div class="w-10 h-10 rounded-xl bg-[#FF4F00] flex items-center justify-center flex-shrink-0 shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
        </svg>
      </div>
      <div class="bg-white border-2 border-gray-200 rounded-3xl rounded-tl-sm px-6 py-5 shadow-sm flex gap-2 items-center">
        <span class="w-2.5 h-2.5 rounded-full bg-gray-400 animate-bounce" style="animation-delay: 0s"></span>
        <span class="w-2.5 h-2.5 rounded-full bg-gray-400 animate-bounce" style="animation-delay: 0.15s"></span>
        <span class="w-2.5 h-2.5 rounded-full bg-gray-400 animate-bounce" style="animation-delay: 0.3s"></span>
      </div>
    </div>
  </ng-container>
</div>

<!-- Input Area — pinned to bottom -->
<div class="flex-shrink-0 px-8 py-6 border-t border-gray-200 bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20 sticky bottom-0">
  <form (ngSubmit)="sendMessage()" class="flex items-center gap-4">
    <input
      id="chat-input"
      [(ngModel)]="inputMessage"
      name="inputMessage"
      type="text"
      placeholder="Pregunta sobre las tiendas..."
      [disabled]="isThinking"
      autocomplete="off"
      class="flex-1 text-xl font-medium px-6 py-5 rounded-2xl border-2 border-gray-300 bg-gray-50 focus:outline-none focus:ring-4 focus:ring-[#FF4F00]/20 focus:border-[#FF4F00] transition-all placeholder-gray-400 disabled:opacity-60 text-gray-900"
    />
    <button
      id="chat-send-btn"
      type="submit"
      [disabled]="isThinking || !inputMessage.trim()"
      class="flex-shrink-0 w-16 h-16 rounded-2xl bg-[#FF4F00] text-white flex items-center justify-center hover:bg-[#E64600] transition-transform disabled:opacity-40 disabled:cursor-not-allowed hover:scale-105 active:scale-95 shadow-md"
      aria-label="Enviar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
      </svg>
    </button>
  </form>
</div>
