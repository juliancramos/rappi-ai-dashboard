<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
  <h3 class="text-2xl font-bold text-gray-900 mb-4">Tendencia de Visibilidad de Tiendas</h3>
  <div class="h-96 xl:h-[450px] w-full" *ngIf="chartData">
    <canvas baseChart
      [data]="chartData"
      [options]="chartOptions"
      [type]="chartType">
    </canvas>
  </div>
</div>
